<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Sort</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0e0f;
    --surface: #141517;
    --surface2: #1c1e21;
    --surface3: #242628;
    --border: #2a2d31;
    --border2: #383c42;
    --accent: #a855f7;
    --accent2: #9333ea;
    --text: #eaebee;
    --text-dim: #8f949e;
    --text-dimmer: #555a63;
    --green: #4caf78;
    --red: #e05252;
    --mono: 'IBM Plex Mono', monospace;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
    line-height: 1.5;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; color: #fff; }
  .logo span { color: var(--accent); }
  .logo-sub { font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; font-weight: 300; }
  .header-link {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.15s;
  }
  .header-link:hover { color: var(--text); }

  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: calc(100vh - 57px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }

  @media (max-width: 640px) {
    html, body { height: auto; overflow: auto; }

    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: auto;
      min-height: calc(100vh - 57px);
    }

    .sidebar {
      border-right: none;
      border-bottom: 1px solid var(--border);
      overflow-y: visible;
    }

    .canvas-area {
      min-height: 60vw;
      padding: 16px;
    }

    #b {
      width: 100%;
      height: auto;
    }

    .drop-overlay {
      inset: 12px;
    }
  }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .settings-group { padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .settings-group-title {
    font-size: 9px; font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--text-dimmer); margin-bottom: 14px;
  }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  .field-label {
    font-size: 11px; color: var(--text-dim); margin-bottom: 5px;
    display: flex; align-items: center; justify-content: space-between;
  }

  /* Editable value badge */
  .field-value-wrap { display: flex; align-items: center; gap: 2px; }
  .field-value {
    color: var(--accent); font-weight: 500; font-size: 11px;
    font-family: var(--mono); background: rgba(232,197,71,0.08);
    border: 1px solid transparent; border-radius: 2px;
    padding: 1px 5px; cursor: text;
    transition: border-color 0.12s, background 0.12s;
    width: auto; min-width: 28px; max-width: 60px; text-align: right;
    appearance: none; -moz-appearance: textfield;
  }
  .field-value::-webkit-inner-spin-button,
  .field-value::-webkit-outer-spin-button { -webkit-appearance: none; }
  .field-value:hover { border-color: rgba(168,85,247,0.35); }
  .field-value:focus { outline: none; border-color: var(--accent); background: rgba(168,85,247,0.14); }

  input[type="range"] {
    width: 100%; appearance: none; height: 3px;
    background: var(--surface3); border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    appearance: none; width: 13px; height: 13px;
    border-radius: 50%; background: var(--accent);
    cursor: pointer; transition: transform 0.1s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  input[type="range"]::-moz-range-thumb {
    width: 13px; height: 13px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
  }

  /* TOGGLE */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .toggle-row:last-child { margin-bottom: 0; }
  .toggle-label { font-size: 11px; color: var(--text-dim); }
  .toggle { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0; background: var(--surface3);
    border-radius: 9px; cursor: pointer;
    transition: background 0.2s; border: 1px solid var(--border2);
  }
  .toggle input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
  .toggle-track::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; background: #fff;
    border-radius: 50%; transition: transform 0.2s;
  }
  .toggle input:checked + .toggle-track::after { transform: translateX(16px); }

  /* Buttons */
  .process-btn {
    width: 100%; background: var(--accent); color: #111; border: none;
    font-family: var(--mono); font-size: 13px; font-weight: 600;
    padding: 11px 24px; border-radius: 3px; cursor: pointer;
    letter-spacing: 0.05em; transition: background 0.15s, transform 0.1s;
    margin-bottom: 8px;
  }
  .process-btn:hover { background: #b96df9; }
  .process-btn:active { transform: scale(0.98); }
  .process-btn:disabled { background: var(--surface3); color: var(--text-dimmer); cursor: not-allowed; }

  .secondary-btn {
    width: 100%; background: none; border: 1px solid var(--border); color: var(--text-dim);
    font-family: var(--mono); font-size: 11px; padding: 8px 14px;
    border-radius: 3px; cursor: pointer; transition: border-color 0.15s, color 0.15s;
    margin-bottom: 8px;
  }
  .secondary-btn:last-child { margin-bottom: 0; }
  .secondary-btn:hover { border-color: var(--border2); color: var(--text); }
  .secondary-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .size-note { font-size: 10px; color: var(--text-dimmer); margin-top: 3px; }

  /* Status */
  .status-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-dim);
    padding: 14px 20px; border-top: 1px solid var(--border);
    margin-top: auto; flex-shrink: 0;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dimmer); flex-shrink: 0; }
  .status-dot.ready { background: var(--green); }
  .status-dot.working { background: var(--accent); animation: pulse 1s infinite; }
  .status-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* CANVAS AREA */
  .canvas-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background: var(--bg);
  }

  /* Drop zone overlay — shown when no image loaded */
  .drop-overlay {
    position: absolute;
    inset: 24px;
    border: 2px dashed var(--border2);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    z-index: 10;
  }
  .drop-overlay.drag-over, .drop-overlay:hover {
    border-color: var(--accent);
    background: rgba(168,85,247,0.04);
  }
  .drop-overlay.hidden { display: none; }
  .drop-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
  .drop-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .drop-sub { font-size: 11px; color: var(--text-dim); }

  /* Canvas */
  #b {
    max-width: 100%;
    max-height: 100%;
    display: block;
    image-rendering: pixelated;
  }

  /* Drag over full canvas area */
  .canvas-area.drag-over .drop-overlay {
    border-color: var(--accent);
    background: rgba(168,85,247,0.04);
  }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #111;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Pixel<span>⇅</span>Sort</div>
  <div class="logo-sub">image pixel sorter</div>
  <a href="https://ericcharl.es" target="_blank" rel="noopener" class="header-link">ericcharl.es ↗</a>
</header>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="settings-group">
      <div class="settings-group-title">Source</div>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <button class="secondary-btn" id="browseBtn">⬡ Browse image…</button>
    </div>

    <div class="settings-group">
      <div class="settings-group-title">Sort</div>

      <div class="toggle-row">
        <span class="toggle-label">Vertical</span>
        <label class="toggle">
          <input type="checkbox" id="vertical" checked>
          <span class="toggle-track"></span>
        </label>
      </div>

      <div class="toggle-row">
        <span class="toggle-label">Invert</span>
        <label class="toggle">
          <input type="checkbox" id="invert">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-group-title">Threshold</div>
      <div class="field">
        <div class="field-label">
          <span>Brightness cutoff</span>
          <div class="field-value-wrap">
            <input class="field-value" id="thresholdVal" type="number" min="0" max="255" value="80" title="Click to type">
          </div>
        </div>
        <input type="range" id="threshold" min="0" max="255" value="80">
        <div class="size-note">Pixels below this brightness break sort runs</div>
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-group-title">Actions</div>
      <button class="process-btn" id="processBtn" disabled>▶ Sort</button>
      <button class="secondary-btn" id="resetBtn" disabled>↺ Reset to original</button>
      <button class="secondary-btn" id="downloadBtn" disabled>↓ Download PNG</button>
    </div>

    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">No image loaded</span>
    </div>

  </div>

  <!-- CANVAS -->
  <div class="canvas-area" id="canvasArea">
    <div class="drop-overlay" id="dropOverlay">
      <div class="drop-icon">⬡</div>
      <div class="drop-title">Drop an image here</div>
      <div class="drop-sub">or click Browse — JPG, PNG, WebP, etc.</div>
    </div>
    <canvas id="b"></canvas>
  </div>

</div>

<script>
const canvas     = document.getElementById('b');
const ctx        = canvas.getContext('2d');
const fileInput  = document.getElementById('fileInput');
const browseBtn  = document.getElementById('browseBtn');
const processBtn = document.getElementById('processBtn');
const resetBtn   = document.getElementById('resetBtn');
const downloadBtn= document.getElementById('downloadBtn');
const dropOverlay= document.getElementById('dropOverlay');
const canvasArea = document.getElementById('canvasArea');
const statusDot  = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const thresholdEl= document.getElementById('threshold');
const thresholdVal=document.getElementById('thresholdVal');
const verticalEl = document.getElementById('vertical');
const invertEl   = document.getElementById('invert');

let loadedImg = null;

// ── Status ────────────────────────────────────────────────────────────────────
function setStatus(state, msg) {
  statusDot.className = 'status-dot' + (state ? ' ' + state : '');
  statusText.textContent = msg;
}

// ── Threshold slider <-> input sync ───────────────────────────────────────────
thresholdEl.addEventListener('input', () => { thresholdVal.value = thresholdEl.value; });
thresholdVal.addEventListener('input', () => {
  const v = Math.min(255, Math.max(0, parseInt(thresholdVal.value) || 0));
  thresholdEl.value = v;
});
thresholdVal.addEventListener('change', () => {
  const v = Math.min(255, Math.max(0, parseInt(thresholdVal.value) || 0));
  thresholdVal.value = v; thresholdEl.value = v;
});
thresholdVal.addEventListener('keydown', e => { if (e.key === 'Enter') thresholdVal.blur(); });

// ── File handling ─────────────────────────────────────────────────────────────
browseBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });

dropOverlay.addEventListener('click', () => fileInput.click());

// Drag-drop on overlay
dropOverlay.addEventListener('dragover',  e => { e.preventDefault(); dropOverlay.classList.add('drag-over'); });
dropOverlay.addEventListener('dragleave', () => dropOverlay.classList.remove('drag-over'));
dropOverlay.addEventListener('drop', e => {
  e.preventDefault();
  dropOverlay.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});

// Also allow drag-drop anywhere on canvas area once image is loaded
canvasArea.addEventListener('dragover',  e => { e.preventDefault(); canvasArea.classList.add('drag-over'); });
canvasArea.addEventListener('dragleave', () => canvasArea.classList.remove('drag-over'));
canvasArea.addEventListener('drop', e => {
  e.preventDefault();
  canvasArea.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      loadedImg = img;
      canvas.width  = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      dropOverlay.classList.add('hidden');
      processBtn.disabled = false;
      resetBtn.disabled   = false;
      downloadBtn.disabled= false;
      setStatus('ready', `${img.width}×${img.height} — ready`);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Reset ─────────────────────────────────────────────────────────────────────
resetBtn.addEventListener('click', () => {
  if (!loadedImg) return;
  ctx.drawImage(loadedImg, 0, 0);
  setStatus('ready', `${loadedImg.width}×${loadedImg.height} — reset`);
});

// ── Download ──────────────────────────────────────────────────────────────────
downloadBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = `sorted_t${thresholdEl.value}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});

// ── Process ───────────────────────────────────────────────────────────────────
processBtn.addEventListener('click', sort);

function sort() {
  if (!loadedImg) return;
  ctx.drawImage(loadedImg, 0, 0);
  const threshold = parseInt(thresholdEl.value);
  const vertical  = verticalEl.checked;
  const invert    = invertEl.checked;

  setStatus('working', 'Sorting…');
  processBtn.disabled = true;
  processBtn.innerHTML = '<span class="spinner"></span> Sorting…';

  // Yield to let UI update before the sync loop
  setTimeout(() => {
    if (vertical) pixelSortV(threshold, invert);
    else          pixelSortH(threshold, invert);

    const w = canvas.width, h = canvas.height;
    setStatus('ready', `${w}×${h} — sorted (t=${threshold})`);
    processBtn.disabled = false;
    processBtn.innerHTML = '▶ Sort';
  }, 20);
}

// ── Sort algorithms ───────────────────────────────────────────────────────────
function meanSort(a, b) {
  return ((a.r+a.g+a.b)/3) - ((b.r+b.g+b.b)/3);
}
function meanSortInv(a, b) {
  return ((b.r+b.g+b.b)/3) - ((a.r+a.g+a.b)/3);
}

function getPixels(data) {
  const p = [];
  for (let i = 0; i < data.length; i += 4)
    p.push({ r: data[i], g: data[i+1], b: data[i+2], a: data[i+3] });
  return p;
}

function setPixels(data, pixels) {
  for (let i = 0; i < pixels.length; i++) {
    data[i*4]   = pixels[i].r;
    data[i*4+1] = pixels[i].g;
    data[i*4+2] = pixels[i].b;
    data[i*4+3] = pixels[i].a;
  }
}

function findValueLess(pixels, val, start) {
  for (let i = start; i < pixels.length; i++)
    if ((pixels[i].r+pixels[i].g+pixels[i].b)/3 < val) return i;
  return pixels.length;
}

function sortSegments(pixels, threshold, invert) {
  const cmp = invert ? meanSortInv : meanSort;
  let start = 0;
  let end   = findValueLess(pixels, threshold, start);
  while (start < pixels.length) {
    const range = pixels.splice(start, end - start);
    range.sort(cmp);
    pixels.splice(start, 0, ...range);
    start = end;
    end   = findValueLess(pixels, threshold, start + 1);
  }
  return pixels;
}

function pixelSortH(threshold, invert) {
  for (let row = 0; row < canvas.height; row++) {
    const id     = ctx.getImageData(0, row, canvas.width, 1);
    const pixels = getPixels(id.data);
    sortSegments(pixels, threshold, invert);
    setPixels(id.data, pixels);
    ctx.putImageData(id, 0, row);
  }
}

function pixelSortV(threshold, invert) {
  for (let col = 0; col < canvas.width; col++) {
    const id     = ctx.getImageData(col, 0, 1, canvas.height);
    const pixels = getPixels(id.data);
    sortSegments(pixels, threshold, invert);
    setPixels(id.data, pixels);
    ctx.putImageData(id, col, 0);
  }
}
</script>
</body>
</html>
